apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ctxwatch.fullname" . }}-redis
  labels:
    {{- include "ctxwatch.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ctxwatch.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/service: redis
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ctxwatch.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/service: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
